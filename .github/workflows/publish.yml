name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish ${{ matrix.package }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: "pdfium-node"
            os: ubuntu-latest
          - package: "pdfium-node-linux-x64-gnu"
            os: ubuntu-latest
          - package: "pdfium-node-darwin-arm64"
            os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify packages
        run: npm run qa
      - name: Publish package
        run: npm publish --workspace "${{ matrix.package }}" --provenance --access public
