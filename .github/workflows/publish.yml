name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify packages
        run: npm run qa
      - name: Publish wrapper package
        run: npm publish --workspace @sebastian-software/pdfium-node --provenance --access public
      - name: Publish darwin arm64 package
        run: npm publish --workspace @sebastian-software/pdfium-node-darwin-arm64 --provenance --access public
      - name: Publish linux x64 glibc package
        run: npm publish --workspace @sebastian-software/pdfium-node-linux-x64-gnu --provenance --access public
