name: Release Please

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  cleanup-subpackage-releases:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
      - name: Delete subpackage GitHub releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./packages/pdfium-node/package.json').version")"
          gh release delete "pdfium-node-darwin-arm64-v${version}" --repo sebastian-software/pdfium-node --yes
          gh release delete "pdfium-node-linux-x64-gnu-v${version}" --repo sebastian-software/pdfium-node --yes

  dispatch-publish:
    needs:
      - release-please
      - cleanup-subpackage-releases
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish.yml --repo sebastian-software/pdfium-node --ref main -f ref=${{ github.sha }}
